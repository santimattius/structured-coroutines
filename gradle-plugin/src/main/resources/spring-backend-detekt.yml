# Preset for Spring/JVM backend services (v1.0.0). Copy or apply from useSpringBackendProfile() docs.
structured-coroutines:
  GlobalScopeUsage:
    active: true
  InlineCoroutineScope:
    active: true
  UnstructuredLaunch:
    active: true
  RunBlockingInSuspend:
    active: true
  BlockingCallInCoroutine:
    active: true
  BlockingCallInCoroutineBackend:
    active: true
  ThreadLocalNotPropagated:
    active: true
  MissingCatchInFlow:
    active: true
  MutableFlowExposed:
    active: true
  SynchronizedInCoroutine:
    active: true
  RunBlockingInCommonMain:
    active: true
  SharedMutableStateInCoroutine:
    active: true
    severity: info
  RedundantWithContext:
    active: false
  SideEffectInMapOperator:
    active: false
  MainScopeWithoutCancel:
    active: true
  RunBlockingInsteadOfRunTest:
    active: true
  HardcodedDispatcherInClass:
    active: true
  SharedFlowForOneshotEvents:
    active: true
  ChannelFlowVsCallbackFlow:
    active: true
  BlockingFutureGet:
    active: true
  MissingCoroutineName:
    active: false
